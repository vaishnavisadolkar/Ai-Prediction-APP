name: CI/CD Deploy for ai prediction app

on:
  push:
    branches:
      - main

env:
  AWS_REGION:   ap-south-1
  S3_MODEL_KEY: models/v1/best_diabetes_prediction.joblib
  ML_IMAGE:     ${{ secrets.DOCKERHUB_USERNAME }}/ml-service:latest
  WEB_IMAGE:    ${{ secrets.DOCKERHUB_USERNAME }}/web:latest

jobs:
  # ── 1. Train & upload model to S3 ─────────────────────────────────────────
  train:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    ap-south-1
      S3_BUCKET:             ${{ secrets.S3_MODEL_BUCKET_NAME }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Train model
        working-directory: ml-service
        env:
          OUTPUT_MODEL_PATH: ${{ runner.temp }}/best_diabetes_prediction.joblib
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          ML_SERVICE_FAST_TRAIN=1 python -m ml_service.train

      - name: Upload model to S3
        id: upload
        env:
          OUTPUT_MODEL_PATH: ${{ runner.temp }}/best_diabetes_prediction.joblib
        run: |
          python - <<'PY'
          import os, boto3
          bucket = os.environ["S3_BUCKET"]
          key    = os.environ["S3_MODEL_KEY"]
          path   = os.environ["OUTPUT_MODEL_PATH"]
          boto3.client("s3").upload_file(path, bucket, key)
          uri = f"s3://{bucket}/{key}"
          print(f"Uploaded → {uri}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"model_s3_uri={uri}\n")
          PY

  # ── 2. Build & push Docker images ────────────────────────────────────────
  build-and-push:
    needs: train
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push ml-service image
        uses: docker/build-push-action@v6
        with:
          context: ./ml-service
          file:    ./ml-service/Dockerfile
          push:    true
          tags:    ${{ env.ML_IMAGE }}

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file:    ./web/Dockerfile
          push:    true
          tags:    ${{ env.WEB_IMAGE }}

  # ── 3. Deploy to EC2 ──────────────────────────────────────────────────────
  deploy:
    needs: [train, build-and-push]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          envs: >-
            DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,
            ML_IMAGE,WEB_IMAGE,
            MODEL_S3_URI,MODEL_HOST_PATH,
            AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_DEFAULT_REGION
          script: |
            set -euo pipefail

            echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

            docker network inspect diabetes-app >/dev/null 2>&1 \
              || docker network create diabetes-app

            docker pull "${ML_IMAGE}"
            docker pull "${WEB_IMAGE}"

            docker stop diabetes-ml diabetes-web 2>/dev/null || true
            docker rm   diabetes-ml diabetes-web 2>/dev/null || true

            if [ -n "${MODEL_S3_URI:-}" ]; then
              docker run -d --restart unless-stopped \
                --network diabetes-app \
                --name diabetes-ml \
                -p 8000:8000 \
                -e MODEL_S3_URI="${MODEL_S3_URI}" \
                -e AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID}" \
                -e AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY}" \
                -e AWS_DEFAULT_REGION="${AWS_DEFAULT_REGION}" \
                "${ML_IMAGE}"
            else
              MP="${MODEL_HOST_PATH:-/home/ubuntu/diabetes-models}"
              docker run -d --restart unless-stopped \
                --network diabetes-app \
                --name diabetes-ml \
                -p 8000:8000 \
                -e MODEL_PATH=/models/v1/best_diabetes_prediction.joblib \
                -v "${MP}:/models:ro" \
                "${ML_IMAGE}"
            fi

            docker run -d --restart unless-stopped \
              --network diabetes-app \
              --name diabetes-web \
              -p 80:3000 \
              -e ML_SERVICE_URL=http://diabetes-ml:8000 \
              "${WEB_IMAGE}"
        env:
          DOCKERHUB_USERNAME:    ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN:       ${{ secrets.DOCKERHUB_TOKEN }}
          MODEL_S3_URI:          s3://${{ secrets.S3_MODEL_BUCKET_NAME }}/${{ env.S3_MODEL_KEY }}
          MODEL_HOST_PATH:       ${{ vars.EC2_MODELS_HOST_PATH }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ap-south-1